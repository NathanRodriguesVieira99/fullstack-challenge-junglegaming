name: Push to main CI pipeline

on:
  push:
    branches: [main]

jobs:
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      ### !! FIX => receber variáveis de ambiente via secrets e criar ambiente isolado para testes
      postgresql-test:
        image: postgres:18.3-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: postgres
          POSTGRES_EXTRA_DATABASES: games,wallets,admin
        volumes:
          - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "Setup NodeJs deps"
        uses: ./.github/actions/setup-node-deps

      - name: Generate Prisma Client (Games)
        working-directory: services/games
        run: bun db:generate

      - name: Run Game Service Unit Tests
        working-directory: services/games
        run: bun test:cov:unit

      - name: Run Game Service E2E Tests
        working-directory: services/games
        run: bun test:cov:e2e

      - name: Generate Prisma Client (Wallets)
        working-directory: services/wallets
        run: bun db:generate

      - name: Run Wallets Service Unit Tests
        working-directory: services/wallets
        run: bun test:cov:unit

      - name: Run Wallets Service E2E Tests
        working-directory: services/wallets
        run: bun test:cov:e2e

      - name: Run Game Service Tests
        working-directory: frontend
        run: bun test:cov

        ## TODO => Adicionar playwright para E2E do frontend
